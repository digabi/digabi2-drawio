<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawio</title>
    <style>
      .outer {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }
      .inner {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <iframe
        id="app"
        src="public/?embed=1&proto=json&noExitBtn=1&stealth=1&autosave=1&modified=unsavedChanges"
        frameborder="0"
        class="inner"
      ></iframe>
    </div>
    <script>
      // Lang query parameter is set by exam window container
      const query = new URLSearchParams(window.location.search)
      const language = query.get('lang').split('-')[0]
      localStorage.setItem('.drawio-config', JSON.stringify({ language }))

      const config = new Map()

      const path = () => `/wd/${encodeURIComponent(config.get('filename'))}`

      async function getFile() {
        const propfindResponse = await fetch(path(), { method: 'PROPFIND' })
        if (propfindResponse.status !== 207) {
          return undefined
        }
        return await fetch(path()).then(resp => resp.text())
      }

      async function saveFile(xml, extra) {
        await fetch(path(), { method: 'PUT', body: xml, ...extra })
      }

      function onLoad() {
        const args = new URLSearchParams(window.location.search)
        config.set('filename', args.get('filename'))
      }

      // drawio will emit 'autosave' events with new xml data whenever the document changes.
      // two attempts will be made to save it:
      // - after <autosaveDelay> ms with no further changes
      // - when the window is closed (and fetch keepalive conditions are met)
      let autosaveXml
      let autosaveTimer
      const autosaveDelay = 7_500

      async function onMessage(event) {
        if (event.data.length === 0) {
          return
        }

        const drawio = document.getElementById('app').contentWindow
        const message = JSON.parse(event.data)

        switch (message.event) {
          case 'init': {
            drawio.postMessage(
              JSON.stringify({
                action: 'load',
                xml: await getFile(),
                autosave: 1
              }),
              '*'
            )
            break
          }
          case 'save': {
            await saveFile(message.xml)
            break
          }
          case 'autosave': {
            autosaveXml = message.xml
            clearTimeout(autosaveTimer)
            autosaveTimer = setTimeout(() => saveFile(autosaveXml), autosaveDelay)
            break
          }
        }
      }

      window.addEventListener('load', onLoad)
      window.addEventListener('message', onMessage)
      window.addEventListener('visibilitychange', ev => {
        if (document.visibilityState === 'hidden' && autosaveXml) {
          saveFile(autosaveXml, { keepalive: true })
        }
      })
    </script>
  </body>
</html>
